version: '3'
services:
  # Update this to the name of the service you want to work with in your docker-compose.yml file
  quilc:
    # Build from Dockerfile instead of using pre-built image directly.
    # GCC 10 is needed because rigetti/quilc ships GCC 9.3 which has a memcmp
    # bug that aws-lc-sys (used by cargo-binstall) rejects at build time.
    # See: https://gcc.gnu.org/bugzilla/show_bug.cgi?id=95189
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile

    volumes:
      # Update this to wherever you want VS Code to mount the folder of your project
      - ..:/workspaces:cached

    # Uncomment the next four lines if you will use a ptrace-based debugger like C++, Go, and Rust.
    # cap_add:
    #   - SYS_PTRACE
    # security_opt:
    #   - seccomp:unconfined

    # rigetti/quilc has ENTRYPOINT ["./quilc"], so we must override both
    # entrypoint and command to prevent "sleep infinity" from being passed as
    # quilc arguments.
    entrypoint: /bin/sh
    command: -c "sleep infinity"
 
